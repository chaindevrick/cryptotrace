# =====================================================================
# CI/CD Pipeline: Frontend Production Deployment
# Design Decision: 針對 Monorepo (單一儲存庫) 架構最佳化。
# Why: 透過 paths 限定只在 frontend/ 資料夾變更時才觸發 Pipeline，
#      避免後端 (Go/Python) 的修改不小心觸發前端的 Firebase 部署，浪費 CI 運算資源。
# =====================================================================
name: Deploy Frontend to Firebase Hosting (Production)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    # Design Decision: 設定預設工作目錄
    # Why: 讓後續的所有 run 指令都在 frontend 資料夾下執行，
    #      消滅冗長的 npm --prefix frontend 語法，提高可讀性。
    defaults:
      run:
        working-directory: ./frontend

    # 核心設定：啟動 Next.js 的靜態匯出模式 (對應 next.config.ts)
    env:
      NEXT_OUTPUT_MODE: export

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================================
      # Defense Mechanism: 環境決定論與快取 (Environment Determinism & Caching)
      # Design Decision: 明確指定 Node.js 20 LTS，並啟動 npm 快取。
      # Why: 確保本地開發與 CI 伺服器的環境完全一致，並透過快取大幅縮短
      #      每次 Push 到 GitHub 後等待 Firebase 上線的時間。
      # =====================================================================
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # =====================================================================
      # Build Phase: 乾淨構建 (Clean Build)
      # Design Decision: 使用 npm ci 取代 npm install。
      # Why: npm ci (Clean Install) 會嚴格讀取 package-lock.json，不會嘗試升級
      #      或修改任何套件版本，且速度更快，是企業級 CI/CD 流程的標準配備。
      # =====================================================================
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      # =====================================================================
      # Deploy Phase: 部署至 Firebase Hosting
      # =====================================================================
      - name: Deploy to Firebase Hosting (Live Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CRYPTOTRACE_489401 }}
          channelId: live
          projectId: cryptotrace-489401
          # 告訴 Firebase CLI，firebase.json 與靜態檔案位於 frontend 資料夾內
          entryPoint: ./frontend